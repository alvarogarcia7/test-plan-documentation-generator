stages:
  - build
  - build-image
  - test

variables:
  DOCKER_HOST: "tcp://server-custom-dind.custom-dind:2375"
  # Move cargo data into the project directory so it can be cached by the runner
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  RUST_BACKTRACE: "1"
  CARGO_INCREMENTAL: "0"

build-image:
  stage: build
  image: docker:27-cli
  script:
    - export COMMIT_SHA=$(git rev-parse --short HEAD)
    - echo "COMMIT_SHA=$COMMIT_SHA" >> build.env
    - echo "Building Rust + Docker image"
    - docker build -t       ${CI_REGISTRY_IMAGE}:${COMMIT_SHA} .
    # Ensure the image can run offline
    - docker run --rm --net none ${CI_REGISTRY_IMAGE}:${COMMIT_SHA} tpdg --help
    # Ensure the image can compile offline
    - docker run --rm --net none ${CI_REGISTRY_IMAGE}:${COMMIT_SHA} cargo --offline build --all --all-features --release
    - docker run --rm --net none ${CI_REGISTRY_IMAGE}:${COMMIT_SHA} cargo --offline build --all --all-features
    # Push the image to the registry
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - docker push           ${CI_REGISTRY_IMAGE}:${COMMIT_SHA}
    - docker tag ${CI_REGISTRY_IMAGE}:${COMMIT_SHA} ${CI_REGISTRY_IMAGE}:latest
    - docker push $CI_REGISTRY_IMAGE:latest
  artifacts:
    reports:
      dotenv: build.env
    expire_in: 1 week
  tags:
    - dind-amd

test-image:
  stage: test
  # Variable comes from artifacts->VARIABLE_NAME
  image: ${CI_REGISTRY_IMAGE}:${COMMIT_SHA}
  variables:
    DOCKER_RUN_FLAGS: "--net none"
    DOCKER_OPTIONS: "--net none"
  # https://gitlab.com/gitlab-org/gitlab-runner/-/work_items/903#:~:text=by%20Koen%20Lekkerkerker-,Problem,%F0%9F%91%8D%2022%20%F0%9F%91%8E%200
  needs:
    - job: build-image
      artifacts: true
  script:
    - uname -a
    - tpdg --help
  tags:
    - dind-amd

push-image:
  stage: test
  image: docker:27-cli
  needs:
    - test-image
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - docker pull ${CI_REGISTRY_IMAGE}:${COMMIT_SHA}
    - docker tag ${CI_REGISTRY_IMAGE}:${COMMIT_SHA} ${CI_REGISTRY_IMAGE}:latest
    #    - docker push $CI_REGISTRY_IMAGE:${COMMIT_SHA} - No need, already pushed
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - master
    - main
  tags:
    - dind-amd

default:
  # Use the commit reference slug (branch/tag name) as the cache key
  cache:
    key: "${CI_COMMIT_REF_SLUG}"
    #    paths:
    #      # Cache the cargo home directory which contains registries and bins
    #      - .cargo
    #      # Cache the build artifacts directory
    #      - target
    #    # This ensures the cache is available to all jobs in the pipeline
    policy: pull-push

ci:
  before_script:
    - rustc --version
    - cargo --version
    - rustup component add rustfmt
    - rustup component add clippy
    - apt update && apt install -y sccache
  image: rust:1.92-bookworm
  stage: build
  script:
    - cargo fmt -- --check
    - cargo clippy --all-targets --all-features -- -D warnings
    - cargo build --release
    - cargo test --release --verbose
  artifacts:
    paths:
      - target/release/tpdg
    expire_in: 1 day
  coverage: '/(\d+\.\d+)% coverage/'
  allow_failure: false
